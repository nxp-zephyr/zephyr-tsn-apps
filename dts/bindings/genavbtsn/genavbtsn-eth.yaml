description: GenAVB/TSN Ethernet interface

compatible: "nxp,genavbtsn-eth"

include: base.yaml

properties:
  port-id:
    type: int
    required: true
    description: GenAVB/TSN logical port id mapped to this interface
  rx-batch-size:
    type: int
    required: true
    description: RX packet batch size
